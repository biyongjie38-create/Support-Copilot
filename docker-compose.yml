services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://support:support@postgres:5432/support_copilot
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: support_copilot
      POSTGRES_USER: support
      POSTGRES_PASSWORD: support
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/001_init_pgvector.sql:/docker-entrypoint-initdb.d/001_init_pgvector.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U support -d support_copilot"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
